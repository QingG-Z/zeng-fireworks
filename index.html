<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>烟花特效</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{
  background:#ffffff;
  overflow:hidden;
  width:100vw;height:100vh;
  display:flex;align-items:center;justify-content:center;
}
canvas{position:fixed;top:0;left:0;width:100%;height:100%;}
#hint{
  position:fixed;bottom:28px;left:50%;transform:translateX(-50%);
  color:rgba(0,0,0,0.18);font-size:14px;letter-spacing:3px;
  font-family:"Microsoft YaHei",sans-serif;
  z-index:99;transition:opacity 1s;pointer-events:none;
}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="hint"></div>

<script>
// ============================================================
//  配置加载
// ============================================================
const CONFIG = {
  mainText:      '莎',
  revealText:    '五一出去玩吗',
  maxParticles:  2200,
  redRatio:      0.3,
  burstSpeed:    18,
  gatherSpeed:   0.025
};
const hintEl = document.getElementById('hint');
hintEl.textContent = `双击「${CONFIG.mainText}」字触发特效`;

fetch('config.json?t=' + Date.now())
  .then(r => r.json())
  .then(data => {
    CONFIG.mainText      = data.mainText      || CONFIG.mainText;
    CONFIG.revealText    = data.revealText    || CONFIG.revealText;
    CONFIG.maxParticles  = data.maxParticles  || 2200;
    CONFIG.redRatio      = data.redRatio !== undefined ? data.redRatio : 0.3;
    CONFIG.burstSpeed    = data.burstSpeed    !== undefined ? data.burstSpeed : 18;
    CONFIG.gatherSpeed   = data.gatherSpeed   !== undefined ? data.gatherSpeed : 0.025;
    hintEl.textContent = `双击「${CONFIG.mainText}」触发特效`;
    document.title = CONFIG.mainText;
  })
  .catch(() => {});

// ============================================================
//  全局设置
// ============================================================
const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');
let W = canvas.width  = window.innerWidth;
let H = canvas.height = window.innerHeight;
window.addEventListener('resize',()=>{
  W = canvas.width  = window.innerWidth;
  H = canvas.height = window.innerHeight;
  if(phase==='idle') drawMain();
});

// ============================================================
//  阶段管理   idle → burst → gather → fireworks
// ============================================================
let phase = 'idle';

// ============================================================
//  工具函数
// ============================================================
const rand  = (a,b)=>Math.random()*(b-a)+a;
const randI = (a,b)=>Math.floor(rand(a,b));
const lerp  = (a,b,t)=>a+(b-a)*t;
const COLORS = [
  '#e63946','#d62828','#c1121f','#ef233c','#ff4444',
  '#e63946','#d62828','#ff6b6b','#b5179e','#f72585',
  '#ffd93d','#6bcb77','#4d96ff','#ff922b','#cc5de8',
  '#f06595','#74c0fc','#ffe066','#9980FA','#FDA7DF'
];
// 红色比例由 CONFIG.redRatio 控制
const RED_COLORS = ['#e63946','#d62828','#c1121f','#ef233c','#ff4444','#ff6b6b','#b5179e','#f72585','#ee5a24','#e17055'];
function pickRedDominantColor(){
  return Math.random() < CONFIG.redRatio
    ? RED_COLORS[randI(0, RED_COLORS.length)]
    : COLORS[randI(0, COLORS.length)];
}

// ============================================================
//  离屏 Canvas 采样文字像素点（通用，支持任意文本）
// ============================================================
function sampleText(text, maxFontSize, fontFamily){
  const oc  = document.createElement('canvas');
  oc.width  = W;
  oc.height = H;
  const ox = oc.getContext('2d');

  // 根据文字长度自动适配字号
  const charCount = text.length;
  let fs;
  if(charCount <= 2){
    fs = maxFontSize || Math.min(W,H)*0.45;
  } else {
    // 多字时根据字数缩减字号，保证不超出屏幕
    fs = Math.min(W * 0.75 / charCount, H * 0.35, maxFontSize || Math.min(W,H)*0.45);
  }
  fs = Math.max(20, fs);

  ox.clearRect(0,0,W,H);
  ox.fillStyle = '#fff';
  ox.font      = `900 ${fs}px ${fontFamily || '"Arial Black","华文圆体","Microsoft YaHei",sans-serif'}`;
  ox.textAlign    = 'center';
  ox.textBaseline = 'middle';
  ox.fillText(text, W/2, H/2);

  const data   = ox.getImageData(0,0,W,H).data;
  // 根据屏幕宽度自适应采样间距：手机端更密集，保证笔画完整
  const gap = Math.max(3, Math.round(W / 80));
  const points = [];
  for(let y=0;y<H;y+=gap){
    for(let x=0;x<W;x+=gap){
      const idx = (y*W+x)*4;
      if(data[idx+3]>128) points.push([x,y]);
    }
  }
  return points;
}

// ============================================================
//  粒子系统
// ============================================================
class Particle {
  constructor(x, y, color){
    this.x  = x; this.y  = y;
    this.ox = x; this.oy = y;
    this.tx = x; this.ty = y;
    this.color = color;
    this.size  = rand(2.5, 4.5);
    // 径向扩散角度（从中心向外）
    this.burstAngle = rand(0, Math.PI*2);
    const speed = rand(CONFIG.burstSpeed * 0.17, CONFIG.burstSpeed);
    this.vx = Math.cos(this.burstAngle)*speed;
    this.vy = Math.sin(this.burstAngle)*speed;
    this.alpha = 1;
    this.state = 'idle';
    this.gatherT = 0;
    this.burstX  = x; this.burstY = y;
    this.colorTarget = color;
    // 记录散开半径，用于反向聚合
    this.burstDist = 0;
  }

  startBurst(){
    this.state  = 'burst';
    this.alpha  = 1;
  }

  startGather(tx,ty,delay){
    this.gatherDelay = delay;
    this.gatherTimer = 0;
    this.state  = 'pregather';
    this.tx = tx; this.ty = ty;
    this.colorTarget = pickRedDominantColor();
  }

  update(){
    if(this.state==='idle') return;

    if(this.state==='burst'){
      // 纯摩擦力衰减，无重力，保持圆状扩散
      this.vx *= 0.965;
      this.vy *= 0.965;
      this.x += this.vx;
      this.y += this.vy;
      // 记录实时散开距离
      this.burstDist = Math.hypot(this.x - this.ox, this.y - this.oy);
      // 边界弹回
      if(this.x<0||this.x>W){ this.vx*=-0.6; this.x=Math.max(0,Math.min(W,this.x)); }
      if(this.y<0||this.y>H){ this.vy*=-0.6; this.y=Math.max(0,Math.min(H,this.y)); }
      if(Math.abs(this.vx)<0.2 && Math.abs(this.vy)<0.2){
        this.burstX=this.x; this.burstY=this.y;
      }
    }

    if(this.state==='pregather'){
      this.gatherTimer++;
      if(this.gatherTimer>=this.gatherDelay){
        this.state='gather';
        this.gatherT=0;
        this.sx=this.x; this.sy=this.y;
        // 计算当前散开方向角（从散开位置到中心），用于反向聚合
        this.gatherAngle = Math.atan2(this.sy - this.ty, this.sx - this.tx);
      }
    }

    if(this.state==='gather'){
      this.gatherT = Math.min(this.gatherT + CONFIG.gatherSpeed, 1);
      const ease = 1-Math.pow(1-this.gatherT,3);
      // 先沿径向方向收缩（前60%），再精确定位到目标（后40%）
      if(this.gatherT < 0.6){
        const radialEase = ease / 0.6;
        // 从散开位置沿反方向径向收缩
        const totalDist = Math.hypot(this.sx - this.tx, this.sy - this.ty);
        const shrink = radialEase * radialEase * totalDist;
        this.x = this.sx - Math.cos(this.gatherAngle) * shrink;
        this.y = this.sy - Math.sin(this.gatherAngle) * shrink;
      } else {
        // 平滑过渡到精确目标位置
        const finalEase = (this.gatherT - 0.6) / 0.4;
        const smoothEase = 1-Math.pow(1-finalEase,2);
        const radialX = this.sx - Math.cos(this.gatherAngle) * Math.hypot(this.sx-this.tx,this.sy-this.ty);
        const radialY = this.sy - Math.sin(this.gatherAngle) * Math.hypot(this.sx-this.tx,this.sy-this.ty);
        this.x = lerp(radialX, this.tx, smoothEase);
        this.y = lerp(radialY, this.ty, smoothEase);
      }
      this.alpha = lerp(0.6, 1, ease);
    }
  }

  draw(){
    if(this.state==='idle') return;
    ctx.save();
    ctx.globalAlpha = this.alpha;
    ctx.shadowBlur  = this.state==='gather' ? 10 : 4;
    ctx.shadowColor = this.color;
    ctx.fillStyle   = this.state==='gather' ? this.colorTarget : this.color;
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.size, 0, Math.PI*2);
    ctx.fill();
    ctx.restore();
  }
}

// ============================================================
//  烟花（满屏升腾）
// ============================================================
class Spark {
  constructor(x,y,color,vx,vy){
    this.x=x;this.y=y;this.color=color;
    this.vx=vx;this.vy=vy;
    this.alpha=1;
    this.size=rand(1.5,3.5);
    this.decay=rand(0.008,0.018);
    this.trail=[];
  }
  update(){
    this.trail.push({x:this.x,y:this.y,a:this.alpha});
    if(this.trail.length>7)this.trail.shift();
    this.vx*=0.96;this.vy*=0.96;this.vy+=0.1;
    this.x+=this.vx;this.y+=this.vy;
    this.alpha-=this.decay;
  }
  draw(){
    for(let i=0;i<this.trail.length;i++){
      const t=this.trail[i],r=i/this.trail.length;
      ctx.save();ctx.globalAlpha=t.a*r*0.35;
      ctx.fillStyle=this.color;
      ctx.beginPath();ctx.arc(t.x,t.y,this.size*r*0.7,0,Math.PI*2);ctx.fill();
      ctx.restore();
    }
    ctx.save();ctx.globalAlpha=this.alpha;
    ctx.shadowBlur=6;ctx.shadowColor=this.color;
    ctx.fillStyle=this.color;
    ctx.beginPath();ctx.arc(this.x,this.y,this.size,0,Math.PI*2);ctx.fill();
    ctx.restore();
  }
}
class FireworkShell {
  constructor(){
    this.x=rand(W*0.1,W*0.9);
    this.y=H+10;
    this.tx=this.x+(rand(-1,1)*200);
    this.ty=rand(H*0.05,H*0.5);
    this.color=pickRedDominantColor();
    const angle=Math.atan2(this.ty-this.y,this.tx-this.x);
    const spd=rand(12,18);
    this.vx=Math.cos(angle)*spd;
    this.vy=Math.sin(angle)*spd;
    this.trail=[];
    this.done=false;
  }
  update(){
    this.trail.push({x:this.x,y:this.y});
    if(this.trail.length>12)this.trail.shift();
    this.vy+=0.06;
    this.x+=this.vx;this.y+=this.vy;
    if(Math.hypot(this.tx-this.x,this.ty-this.y)<10)this.done=true;
  }
  draw(){
    for(let i=0;i<this.trail.length;i++){
      const t=this.trail[i],r=i/this.trail.length;
      ctx.save();ctx.globalAlpha=r*0.7;
      ctx.shadowBlur=4;ctx.shadowColor=this.color;
      ctx.fillStyle=this.color;
      ctx.beginPath();ctx.arc(t.x,t.y,2.5*r,0,Math.PI*2);ctx.fill();
      ctx.restore();
    }
  }
}
function explode(x,y,n=110){
  const c1=pickRedDominantColor(),c2=pickRedDominantColor();
  for(let i=0;i<n;i++){
    const a=rand(0,Math.PI*2),spd=rand(2,9);
    sparks.push(new Spark(x,y,Math.random()>0.4?c1:c2,
      Math.cos(a)*spd,Math.sin(a)*spd));
  }
}
const sparks=[];
const shells=[];

// ============================================================
//  心跳动画（idle状态下绘制主文字）
// ============================================================
let heartT=0;

function drawMain(){
  const text = CONFIG.mainText;
  ctx.clearRect(0,0,W,H);

  // 根据文字长度自适应字号
  const charCount = text.length;
  let fs;
  if(charCount <= 2){
    fs = Math.min(W,H)*0.45;
  } else {
    fs = Math.min(W * 0.75 / charCount, H * 0.35);
  }
  fs = Math.max(20, fs);

  // 心跳缩放
  heartT += 0.03;
  const beat = 1 + 0.04*Math.abs(Math.sin(heartT*2.2))
                 + 0.015*Math.abs(Math.sin(heartT*4.4));

  ctx.save();
  ctx.translate(W/2, H/2);
  ctx.scale(beat, beat);
  ctx.translate(-W/2, -H/2);

  const fontStr = `900 ${fs}px "Arial Black","华文圆体","Microsoft YaHei",sans-serif`;
  ctx.font = fontStr;
  ctx.textAlign    = 'center';
  ctx.textBaseline = 'middle';

  // 最外层光晕
  ctx.save();
  ctx.shadowBlur  = 40;
  ctx.shadowColor = 'rgba(230,57,70,0.3)';
  ctx.lineWidth   = fs*0.15;
  ctx.strokeStyle = 'rgba(230,57,70,0.1)';
  ctx.lineJoin    = 'round';
  ctx.strokeText(text, W/2, H/2);
  ctx.restore();

  // 充气轮廓
  for(let i=5;i>=1;i--){
    ctx.save();
    ctx.lineWidth   = fs*0.08*i;
    ctx.lineJoin    = 'round';
    ctx.lineCap     = 'round';
    const r=230-i*10, g=57-i*5, b=70+i*15;
    ctx.strokeStyle = `rgba(${r},${g},${b},${0.06+i*0.03})`;
    ctx.shadowBlur  = 15*i;
    ctx.shadowColor = `rgba(230,57,70,0.15)`;
    ctx.strokeText(text, W/2, H/2);
    ctx.restore();
  }

  // 渐变填充
  const grad = ctx.createLinearGradient(W/2-fs*0.5, H/2-fs*0.5, W/2+fs*0.5, H/2+fs*0.5);
  grad.addColorStop(0,   '#e63946');
  grad.addColorStop(0.25,'#d62828');
  grad.addColorStop(0.5, '#b5179e');
  grad.addColorStop(0.75,'#f72585');
  grad.addColorStop(1,   '#ff6b6b');
  ctx.save();
  ctx.fillStyle = grad;
  ctx.shadowBlur  = 30;
  ctx.shadowColor = 'rgba(230,57,70,0.6)';
  ctx.fillText(text, W/2, H/2);
  ctx.restore();

  // 高光
  ctx.save();
  ctx.globalCompositeOperation = 'lighter';
  const hl = ctx.createRadialGradient(
    W/2-fs*0.12, H/2-fs*0.18, 0,
    W/2-fs*0.12, H/2-fs*0.18, fs*0.25
  );
  hl.addColorStop(0,'rgba(255,200,200,0.45)');
  hl.addColorStop(1,'rgba(255,200,200,0)');
  ctx.fillStyle=hl;
  ctx.beginPath();
  ctx.ellipse(W/2-fs*0.12, H/2-fs*0.18, fs*0.2, fs*0.12, -0.5, 0, Math.PI*2);
  ctx.fill();
  ctx.restore();

  ctx.restore();
}

// ============================================================
//  粒子集合 & 主逻辑
// ============================================================
let particles = [];
let fireworksActive = false;
let fireworksTimer  = 0;
const FIREWORKS_DURATION = 300;

function buildParticlesFromMain(){
  const text = CONFIG.mainText;
  let pts = sampleText(text);
  particles = [];

  // 稀疏化
  if(pts.length > CONFIG.maxParticles){
    const step = pts.length/CONFIG.maxParticles;
    const arr=[];
    for(let i=0;i<CONFIG.maxParticles;i++) arr.push(pts[Math.floor(i*step)]);
    pts=arr;
  }

  const cList = ['#e63946','#d62828','#c1121f','#ef233c','#ff6b6b',
                 '#b5179e','#f72585','#ee5a24','#f72585','#ffd93d'];
  pts.forEach(([x,y])=>{
    const c=Math.random()<CONFIG.redRatio
      ? RED_COLORS[randI(0,RED_COLORS.length)]
      : cList[randI(0,cList.length)];
    particles.push(new Particle(x,y,c));
  });
}

function startBurst(){
  phase='burst';
  hintEl.style.opacity='0';
  particles.forEach(p=>p.startBurst());
  setTimeout(startGather, 2200);
}

function startGather(){
  phase='gather';

  let targetPts = sampleText(CONFIG.revealText);
  if(targetPts.length>CONFIG.maxParticles){
    const step=targetPts.length/CONFIG.maxParticles;
    const arr=[];
    for(let i=0;i<CONFIG.maxParticles;i++) arr.push(targetPts[Math.floor(i*step)]);
    targetPts=arr;
  }

  const shuffled=[...particles].sort(()=>Math.random()-0.5);

  for(let i=0;i<shuffled.length;i++){
    if(i<targetPts.length){
      const [tx,ty]=targetPts[i%targetPts.length];
      shuffled[i].startGather(tx, ty, randI(0,60));
    } else {
      shuffled[i].alpha=0;
      shuffled[i].state='dead';
    }
  }

  if(targetPts.length>shuffled.length){
    for(let i=shuffled.length;i<targetPts.length;i++){
      const [tx,ty]=targetPts[i];
      const p=new Particle(rand(0,W),rand(0,H),pickRedDominantColor());
      p.sx=p.x;p.sy=p.y;
      p.tx=tx;p.ty=ty;
      p.state='gather';p.gatherT=0;
      p.colorTarget=pickRedDominantColor();
      particles.push(p);
    }
  }

  setTimeout(()=>{
    fireworksActive=true;
    fireworksTimer=0;
  },1500);
}

// ============================================================
//  主渲染循环
// ============================================================
function loop(){
  requestAnimationFrame(loop);

  if(phase==='idle'){
    ctx.fillStyle='rgba(255,255,255,1)';
    ctx.fillRect(0,0,W,H);
    drawMain();
    return;
  }

  ctx.fillStyle='rgba(255,255,255,0.2)';
  ctx.fillRect(0,0,W,H);

  if(fireworksActive){
    fireworksTimer++;
    if(fireworksTimer < FIREWORKS_DURATION){
      if(Math.random()<0.06){
        shells.push(new FireworkShell());
        shells.push(new FireworkShell());
      }
    } else {
      fireworksActive=false;
    }
  }
  for(let i=shells.length-1;i>=0;i--){
    shells[i].update(); shells[i].draw();
    if(shells[i].done){ explode(shells[i].x,shells[i].y); shells.splice(i,1); }
  }
  for(let i=sparks.length-1;i>=0;i--){
    sparks[i].update(); sparks[i].draw();
    if(sparks[i].alpha<=0) sparks.splice(i,1);
  }

  particles.forEach(p=>{ p.update(); p.draw(); });
}
loop();

// ============================================================
//  双击事件
// ============================================================
canvas.addEventListener('dblclick', e=>{
  if(phase!=='idle') return;
  buildParticlesFromMain();
  startBurst();
});

canvas.addEventListener('click',e=>{
  if(phase!=='idle') return;
  heartT += 1.5;
});
</script>
</body>
</html>

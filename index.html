<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>曾</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{
  background:#06061a;
  overflow:hidden;
  width:100vw;height:100vh;
  display:flex;align-items:center;justify-content:center;
}
canvas{position:fixed;top:0;left:0;width:100%;height:100%;}
#hint{
  position:fixed;bottom:28px;left:50%;transform:translateX(-50%);
  color:rgba(255,255,255,0.22);font-size:14px;letter-spacing:3px;
  font-family:"Microsoft YaHei",sans-serif;
  z-index:99;transition:opacity 1s;pointer-events:none;
}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="hint">双击「曾」字触发特效</div>

<script>
// ============================================================
//  全局设置
// ============================================================
const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');
let W = canvas.width  = window.innerWidth;
let H = canvas.height = window.innerHeight;
window.addEventListener('resize',()=>{
  W = canvas.width  = window.innerWidth;
  H = canvas.height = window.innerHeight;
  if(phase==='idle') drawZeng();
});

// ============================================================
//  阶段管理   idle → burst → gather → fireworks
// ============================================================
let phase = 'idle';   // idle | burst | gather | fireworks

// ============================================================
//  工具函数
// ============================================================
const rand  = (a,b)=>Math.random()*(b-a)+a;
const randI = (a,b)=>Math.floor(rand(a,b));
const lerp  = (a,b,t)=>a+(b-a)*t;
const COLORS = ['#ff6b6b','#ffd93d','#6bcb77','#4d96ff','#ff922b',
                '#cc5de8','#f06595','#74c0fc','#ffe066','#a9e34b',
                '#63e6be','#f783ac','#ffffff','#ffa8a8','#d0bfff',
                '#ff9f43','#ee5a24','#0652DD','#9980FA','#FDA7DF'];

// ============================================================
//  离屏 Canvas 采样文字像素点
// ============================================================
function sampleText(text, fontSize, fontStr){
  const oc  = document.createElement('canvas');
  const gap = 8; // 采样间距（越小粒子越多）
  oc.width  = W;
  oc.height = H;
  const ox = oc.getContext('2d');
  ox.clearRect(0,0,W,H);
  ox.fillStyle = '#fff';
  ox.font      = fontStr || `900 ${fontSize}px "Arial Black","Impact",sans-serif`;
  ox.textAlign    = 'center';
  ox.textBaseline = 'middle';
  ox.fillText(text, W/2, H/2);
  const data   = ox.getImageData(0,0,W,H).data;
  const points = [];
  for(let y=0;y<H;y+=gap){
    for(let x=0;x<W;x+=gap){
      const idx = (y*W+x)*4;
      if(data[idx+3]>128) points.push([x,y]);
    }
  }
  return points;
}

// 采样"曾"字 & "666"字
function sampleZeng(){ return sampleText('曾', Math.min(W,H)*0.45, `900 ${Math.min(W,H)*0.45}px "Arial Black","华文圆体","Microsoft YaHei",sans-serif`); }
function sample666(){
  // 分三列采样三个"6"
  const oc  = document.createElement('canvas');
  oc.width  = W; oc.height = H;
  const ox  = oc.getContext('2d');
  const fs  = Math.min(W/4, H*0.4);
  ox.clearRect(0,0,W,H);
  ox.fillStyle = '#fff';
  ox.font      = `900 ${fs}px "Arial Black","Impact",sans-serif`;
  ox.textAlign    = 'center';
  ox.textBaseline = 'middle';
  const spacing = fs * 0.85;
  ox.fillText('6', W/2 - spacing, H/2);
  ox.fillText('6', W/2,           H/2);
  ox.fillText('6', W/2 + spacing, H/2);
  const data   = ox.getImageData(0,0,W,H).data;
  const gap    = 8;
  const points = [];
  for(let y=0;y<H;y+=gap){
    for(let x=0;x<W;x+=gap){
      const idx=(y*W+x)*4;
      if(data[idx+3]>128) points.push([x,y]);
    }
  }
  return points;
}

// ============================================================
//  粒子系统
// ============================================================
class Particle {
  constructor(x, y, color){
    this.x  = x; this.y  = y;
    this.ox = x; this.oy = y; // 原始位置（曾字像素）
    this.tx = x; this.ty = y; // 目标位置（666像素）
    this.color = color;
    this.size  = rand(2.5, 4.5);
    // 爆散速度
    const angle = rand(0, Math.PI*2);
    const speed = rand(3, 18);
    this.vx = Math.cos(angle)*speed;
    this.vy = Math.sin(angle)*speed;
    this.alpha = 1;
    this.state = 'idle'; // idle | burst | gather
    this.gatherT = 0;
    this.burstX  = x; this.burstY = y; // 爆散后的停留位置
    this.colorTarget = color; // gather阶段最终颜色
  }

  startBurst(){
    this.state  = 'burst';
    this.alpha  = 1;
  }

  startGather(tx,ty,delay){
    this.gatherDelay = delay;
    this.gatherTimer = 0;
    this.state  = 'pregather';
    this.tx = tx; this.ty = ty;
    // gather时换颜色（彩色666）
    this.colorTarget = COLORS[randI(0,COLORS.length)];
  }

  update(){
    if(this.state==='idle') return;

    if(this.state==='burst'){
      this.vx *= 0.93;
      this.vy *= 0.93;
      this.vy += 0.18; // 微重力
      this.x += this.vx;
      this.y += this.vy;
      // 边界反弹阻尼
      if(this.x<0||this.x>W){ this.vx*=-0.5; this.x=Math.max(0,Math.min(W,this.x)); }
      if(this.y>H){ this.vy*=-0.4; this.y=H; }
      // 速度足够小时记录停留
      if(Math.abs(this.vx)<0.3 && Math.abs(this.vy)<0.3){
        this.burstX=this.x; this.burstY=this.y;
      }
    }

    if(this.state==='pregather'){
      this.gatherTimer++;
      if(this.gatherTimer>=this.gatherDelay){
        this.state='gather';
        this.gatherT=0;
        // 记录当前scatter位置作为起始点
        this.sx=this.x; this.sy=this.y;
      }
    }

    if(this.state==='gather'){
      this.gatherT = Math.min(this.gatherT+0.025, 1);
      const ease = 1-Math.pow(1-this.gatherT,3); // easeOutCubic
      this.x = lerp(this.sx, this.tx, ease);
      this.y = lerp(this.sy, this.ty, ease);
      this.alpha = lerp(0.6, 1, ease);
    }
  }

  draw(){
    if(this.state==='idle') return;
    ctx.save();
    ctx.globalAlpha = this.alpha;
    ctx.shadowBlur  = this.state==='gather' ? 10 : 4;
    ctx.shadowColor = this.color;
    ctx.fillStyle   = this.state==='gather' ? this.colorTarget : this.color;
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.size, 0, Math.PI*2);
    ctx.fill();
    ctx.restore();
  }
}

// ============================================================
//  烟花（满屏升腾）
// ============================================================
class Spark {
  constructor(x,y,color,vx,vy){
    this.x=x;this.y=y;this.color=color;
    this.vx=vx;this.vy=vy;
    this.alpha=1;
    this.size=rand(1.5,3.5);
    this.decay=rand(0.008,0.018);
    this.trail=[];
  }
  update(){
    this.trail.push({x:this.x,y:this.y,a:this.alpha});
    if(this.trail.length>7)this.trail.shift();
    this.vx*=0.96;this.vy*=0.96;this.vy+=0.1;
    this.x+=this.vx;this.y+=this.vy;
    this.alpha-=this.decay;
  }
  draw(){
    for(let i=0;i<this.trail.length;i++){
      const t=this.trail[i],r=i/this.trail.length;
      ctx.save();ctx.globalAlpha=t.a*r*0.35;
      ctx.fillStyle=this.color;
      ctx.beginPath();ctx.arc(t.x,t.y,this.size*r*0.7,0,Math.PI*2);ctx.fill();
      ctx.restore();
    }
    ctx.save();ctx.globalAlpha=this.alpha;
    ctx.shadowBlur=6;ctx.shadowColor=this.color;
    ctx.fillStyle=this.color;
    ctx.beginPath();ctx.arc(this.x,this.y,this.size,0,Math.PI*2);ctx.fill();
    ctx.restore();
  }
}
class FireworkShell {
  constructor(){
    this.x=rand(W*0.1,W*0.9);
    this.y=H+10;
    this.tx=this.x+(rand(-1,1)*200);
    this.ty=rand(H*0.05,H*0.5);
    this.color=COLORS[randI(0,COLORS.length)];
    const angle=Math.atan2(this.ty-this.y,this.tx-this.x);
    const spd=rand(12,18);
    this.vx=Math.cos(angle)*spd;
    this.vy=Math.sin(angle)*spd;
    this.trail=[];
    this.done=false;
  }
  update(){
    this.trail.push({x:this.x,y:this.y});
    if(this.trail.length>12)this.trail.shift();
    this.vy+=0.06;
    this.x+=this.vx;this.y+=this.vy;
    if(Math.hypot(this.tx-this.x,this.ty-this.y)<10)this.done=true;
  }
  draw(){
    for(let i=0;i<this.trail.length;i++){
      const t=this.trail[i],r=i/this.trail.length;
      ctx.save();ctx.globalAlpha=r*0.7;
      ctx.shadowBlur=4;ctx.shadowColor=this.color;
      ctx.fillStyle=this.color;
      ctx.beginPath();ctx.arc(t.x,t.y,2.5*r,0,Math.PI*2);ctx.fill();
      ctx.restore();
    }
  }
}
function explode(x,y,n=110){
  const c1=COLORS[randI(0,COLORS.length)],c2=COLORS[randI(0,COLORS.length)];
  for(let i=0;i<n;i++){
    const a=rand(0,Math.PI*2),spd=rand(2,9);
    sparks.push(new Spark(x,y,Math.random()>0.4?c1:c2,
      Math.cos(a)*spd,Math.sin(a)*spd));
  }
}
const sparks=[];
const shells=[];

// ============================================================
//  心跳动画（idle状态下在canvas上绘制「曾」字）
// ============================================================
let heartT=0;
let zengPoints=[];

function drawZeng(){
  // 清空后绘制大号气球风格「曾」字
  ctx.clearRect(0,0,W,H);
  const fs = Math.min(W,H)*0.45;

  // 心跳缩放
  heartT += 0.03;
  const beat = 1 + 0.04*Math.abs(Math.sin(heartT*2.2))
                 + 0.015*Math.abs(Math.sin(heartT*4.4));

  ctx.save();
  ctx.translate(W/2, H/2);
  ctx.scale(beat, beat);
  ctx.translate(-W/2, -H/2);

  // --- 充气气球感：多层描边 + 渐变填充 ---
  ctx.font = `900 ${fs}px "Arial Black","华文圆体","Microsoft YaHei",sans-serif`;
  ctx.textAlign    = 'center';
  ctx.textBaseline = 'middle';

  // 最外层白色光晕
  ctx.save();
  ctx.shadowBlur  = 60;
  ctx.shadowColor = 'rgba(200,150,255,0.6)';
  ctx.lineWidth   = fs*0.18;
  ctx.strokeStyle = 'rgba(255,255,255,0.12)';
  ctx.lineJoin    = 'round';
  ctx.strokeText('曾', W/2, H/2);
  ctx.restore();

  // 充气轮廓（多圈描边模拟膨胀）
  for(let i=5;i>=1;i--){
    ctx.save();
    ctx.lineWidth   = fs*0.08*i;
    ctx.lineJoin    = 'round';
    ctx.lineCap     = 'round';
    const r=255-i*15, g=100+i*20, b=255-i*10;
    ctx.strokeStyle = `rgba(${r},${g},${b},${0.05+i*0.04})`;
    ctx.shadowBlur  = 20*i;
    ctx.shadowColor = `rgba(180,100,255,0.3)`;
    ctx.strokeText('曾', W/2, H/2);
    ctx.restore();
  }

  // 渐变填充
  const grad = ctx.createLinearGradient(W/2-fs*0.5, H/2-fs*0.5, W/2+fs*0.5, H/2+fs*0.5);
  grad.addColorStop(0,   '#ff9ff3');
  grad.addColorStop(0.25,'#ffeaa7');
  grad.addColorStop(0.5, '#a29bfe');
  grad.addColorStop(0.75,'#fd79a8');
  grad.addColorStop(1,   '#74b9ff');
  ctx.save();
  ctx.fillStyle = grad;
  ctx.shadowBlur  = 30;
  ctx.shadowColor = 'rgba(255,180,255,0.8)';
  ctx.fillText('曾', W/2, H/2);
  ctx.restore();

  // 高光（左上角白斑，模拟气球反光）
  ctx.save();
  ctx.globalCompositeOperation = 'lighter';
  const hl = ctx.createRadialGradient(
    W/2-fs*0.12, H/2-fs*0.18, 0,
    W/2-fs*0.12, H/2-fs*0.18, fs*0.25
  );
  hl.addColorStop(0,'rgba(255,255,255,0.55)');
  hl.addColorStop(1,'rgba(255,255,255,0)');
  ctx.fillStyle=hl;
  ctx.beginPath();
  ctx.ellipse(W/2-fs*0.12, H/2-fs*0.18, fs*0.2, fs*0.12, -0.5, 0, Math.PI*2);
  ctx.fill();
  ctx.restore();

  ctx.restore(); // beat scale
}

// ============================================================
//  粒子集合 & 主逻辑
// ============================================================
let particles = [];
let gatherDone = false;
let fireworksActive = false;
let fireworksTimer  = 0;
const FIREWORKS_DURATION = 300; // 帧数

function buildParticlesFromZeng(){
  zengPoints = sampleZeng();
  particles  = [];
  // 为每个采样点建一个粒子
  // 若点太多，稀疏化
  let pts = zengPoints;
  if(pts.length > 2200){
    // 均匀抽样2200
    const step = pts.length/2200;
    const arr=[];
    for(let i=0;i<2200;i++) arr.push(pts[Math.floor(i*step)]);
    pts=arr;
    zengPoints=arr;
  }
  const cList = ['#ff9ff3','#ffeaa7','#a29bfe','#fd79a8','#74b9ff',
                 '#55efc4','#fdcb6e','#e17055','#6c5ce7','#00cec9'];
  pts.forEach(([x,y])=>{
    const c=cList[randI(0,cList.length)];
    particles.push(new Particle(x,y,c));
  });
}

function startBurst(){
  phase='burst';
  document.getElementById('hint').style.opacity='0';
  particles.forEach(p=>p.startBurst());

  // 3秒后开始gather到666
  setTimeout(startGather, 2200);
}

function startGather(){
  phase='gather';
  gatherDone=false;

  // 采样666的像素点
  let targetPts = sample666();
  if(targetPts.length>2200){
    const step=targetPts.length/2200;
    const arr=[];
    for(let i=0;i<2200;i++) arr.push(targetPts[Math.floor(i*step)]);
    targetPts=arr;
  }

  // 打乱粒子顺序，随机分配到666像素
  const shuffled=[...particles].sort(()=>Math.random()-0.5);
  const n=Math.min(shuffled.length,targetPts.length);

  for(let i=0;i<shuffled.length;i++){
    if(i<targetPts.length){
      const [tx,ty]=targetPts[i%targetPts.length];
      shuffled[i].startGather(tx, ty, randI(0,60));
    } else {
      // 多余粒子淡出
      shuffled[i].alpha=0;
      shuffled[i].state='dead';
    }
  }
  // 不够用的点（粒子少于目标点），补充新粒子
  if(targetPts.length>shuffled.length){
    for(let i=shuffled.length;i<targetPts.length;i++){
      const [tx,ty]=targetPts[i];
      // 从屏幕随机位置飞入
      const p=new Particle(rand(0,W),rand(0,H),COLORS[randI(0,COLORS.length)]);
      p.sx=p.x;p.sy=p.y;
      p.tx=tx;p.ty=ty;
      p.state='gather';p.gatherT=0;
      p.colorTarget=COLORS[randI(0,COLORS.length)];
      particles.push(p);
    }
  }

  // 1.5s后启动烟花
  setTimeout(()=>{
    fireworksActive=true;
    fireworksTimer=0;
  },1500);
}

// ============================================================
//  主渲染循环
// ============================================================
function loop(){
  requestAnimationFrame(loop);

  if(phase==='idle'){
    // 背景
    ctx.fillStyle='rgba(6,6,26,1)';
    ctx.fillRect(0,0,W,H);
    drawZeng();
    return;
  }

  // 拖尾背景
  ctx.fillStyle='rgba(6,6,26,0.18)';
  ctx.fillRect(0,0,W,H);

  // 烟花
  if(fireworksActive){
    fireworksTimer++;
    if(fireworksTimer < FIREWORKS_DURATION){
      if(Math.random()<0.06){
        shells.push(new FireworkShell());
        shells.push(new FireworkShell());
      }
    } else {
      fireworksActive=false;
    }
  }
  for(let i=shells.length-1;i>=0;i--){
    shells[i].update(); shells[i].draw();
    if(shells[i].done){ explode(shells[i].x,shells[i].y); shells.splice(i,1); }
  }
  for(let i=sparks.length-1;i>=0;i--){
    sparks[i].update(); sparks[i].draw();
    if(sparks[i].alpha<=0) sparks.splice(i,1);
  }

  // 粒子
  particles.forEach(p=>{ p.update(); p.draw(); });
}
loop();

// ============================================================
//  双击事件
// ============================================================
canvas.addEventListener('dblclick', e=>{
  if(phase!=='idle') return;
  // 检测是否点击在「曾」字范围内（用zengPoints判断）
  buildParticlesFromZeng();
  startBurst();
});

// 点击提示
canvas.addEventListener('click',e=>{
  if(phase!=='idle') return;
  // 单击轻微弹跳
  heartT += 1.5;
});
</script>
</body>
</html>
